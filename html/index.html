<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <!--aqui fica aquele logo pequeno que aparece no nome das paginas-->
    <link rel="icon" type="image/png" href="../images/logoicon.png">
    <!--os links para eu usar a fonte Jaro que usei no meu figma-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jaro:opsz@6..72&display=swap" rel="stylesheet">
    <!--chamada para o meu css principal(style)externo-->
    <link rel="stylesheet" type="text/css" href="../css/style.css">
</head>
<body>
    <!--Parte do Header-->
    <header>
        <!--imagem do logo principal-->
        <div class="container-logo">
            <img src="../images/logoPrincipal.png" alt="logo principal">
        </div>
        <!--as minhas barras de navegação-->
        <nav class="barras-navegacao">
           <div id="home"><a href="./index.html">Home</a></div>
           <div id="servicos"><a href="./servico.html" >Serviços</a></div>
           <div id="sobre"><a>Sobre</a></div>
           <div id="contato"><a>Contato</a></div>
        </nav>

        

    </header>
    <!--Parte do Main-->
    <main>
        <!--Na minha seção terá os conteudos das matérias-->
        <section class="conteudos-home">
            <div id="matematica">
                <!--fiz uma ligação já com o conteudo da matematica que esta na pagina de serviços. fiz a mesma coisa com os outros-->
                <a href="servico.html#secao-matematica"><img src="../images/mate.png"></a>
            </div>
            <div id="portugues">
                <a href="servico.html#secao-portugues"><img src="../images/port.png"></a>
            </div>
            <div id="ciencias">
                <a href="servico.html#secao-ciencias" ><img src="../images/cie.png"></a>
            </div>
        </section>
    </main>




    <!--Parte do footer(meu rodapé)-->
    <footer>
        <!--Criei essa div principal para deixar mais organizado e conseguir um controle mais geral quando uso o css-->
        <div class="footer-principal">
            <div class="container-menu">
            <h3>Nosso Menu</h3>
            <nav class="menu-rodape">
                <ul>
                    <li>
                        <div class="item-rodape">
                            <img src="../images/house-regular.png" alt="pequena logo home">
                            <!--cada item sendo refenciado a sua respectiva funcionalidade(pagina)-->
                            <a href="index.html">Home</a>
                        </div>
                    </li>
                    <li>
                        <div class="item-rodape">
                            <img src="../images/list-solid.png" alt="pequena logo servicos">
                            <a href="servico.html">Serviços</a>
                        </div>
                    </li>
                    <li>
                        <div class="item-rodape">
                            <img src="../images/circle-info-solid.png" alt="pequeno logo sobre">
                            <a>Sobre</a>
                        </div>
                    </li>
                    <li>
                        <div class="item-rodape">
                            <img src="../images/envelope-regular.png" pequeno logo contato >
                            <a>Contato</a>
                        </div>
                    </li>
                </ul>
            </nav>
            
            </div>
            <div class="container-institucional">
                <h3>Institucional</h3>
                <img src="../images/logoPrincipal.png" alt="logo principal">
            </div>
            <div class="container-redes">
                <h3>Nossas Redes Sociais</h3>
                <div class="icones-redes">
                    <img src="../images/whatsapp.png" alt="whatsapp">
                    <img src="../images/instagram.png" alt="instagran">
                    <img src="../images/linkedin.png" alt="linkendin">
                    <img src="../images/youtube.png" alt="youtube">
                </div>
            
            </div>
        </div>
        <div class="footer-copyright">
            <p>&copy; 2026 Reforço Escolar - Desenvolvido por Rodrigo. Todos os direitos reservados.
            </p>
        </div>
        
    </footer>
    
</body>
</html>
